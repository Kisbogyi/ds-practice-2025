syntax = "proto3";

package suggestions;

service SuggestionsServiceInit {
    rpc SuggestBook(SuggestionRequest) returns (completionVC);
}

service SuggestionsServiceFinished {
    rpc Response(SuggestionResponse) returns (Empty);
}

message SuggestionRequest {
    string order_id = 1;
    repeated int32 vc = 2;
    string book_name = 3;
}

message completionVC {
    repeated int32 vc = 1;
}

message SuggestionResponse {
    // if failed the title, authors and id are empty strings
    bool failed = 1
    repeated string titles = 2;
    repeated string authors = 3;
    repeated string id = 4;
}

message Empty {
}
