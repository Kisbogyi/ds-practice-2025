syntax = "proto3";

package fraud_detection;

service FraudDetectionServiceInit{
    rpc InitOrder (InitRequest) returns (completionVC);
    rpc ClearOrder (ClearRequest) returns (clearStatus);
}

service FraudDetectionServiceFinished {
  rpc Response(FraudResponse) returns (Empty);
}

message InitRequest {
    string order_id = 1;
    repeated int32 vc = 2;
    string user_name = 3;
    string card_number = 4;
    int32 order_amount = 5;
    string billing_address = 6;
}

message ClearRequest{
    string order_id = 1;
    repeated int32 vc = 2;
}

message completionVC {
    repeated int32 vc = 1;
}

message clearStatus {
    bool success = 1;
}


message FraudResponse {
    string order_id = 1;
    bool success = 2;
    string reason = 3;
}

message Empty {
}
