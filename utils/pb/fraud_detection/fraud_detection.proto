syntax = "proto3";

package fraud_detection;

service FraudDetectionServiceInit{
    rpc InitOrder (InitRequest) returns (completionVC);
    rpc ClearOrder (ClearRequest) returns (clearStatus);
}

service FraudDetectionServiceFinished {
  rpc Response(FraudResponse) returns (Empty);
}


message InitRequest {
    string order_id = 1;
    repeated int32 vc = 2;
    string username = 3;
    int32 order_amount = 4;
    string billing_address = 5;
}

message ClearRequest{
    string order_id = 1;
    repeated int32 vc = 1;
}

message completionVC {
    repeated int32 vc = 1;
}

message clearStatus {
    bool success = 1;
}


message FraudResponse {
    string order_id = 1;
    bool success = 2;
    string reason = 3;
}

message Empty {
}
